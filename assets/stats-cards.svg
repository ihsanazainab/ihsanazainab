<svg width="100%" height="140" viewBox="0 0 700 140" xmlns="http://www.w3.org/2000/svg" font-family="Fira Code, monospace">
  <defs>
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
  </defs>

  <!-- Card 1: 8+ Channels Mastered -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0.1s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" from="0,20" to="0,0" dur="0.6s" begin="0.1s" fill="freeze"/>
    <rect x="0" y="0" width="220" height="120" rx="14" fill="url(#cardBg)" stroke="#10b981" stroke-opacity="0.35"/>
    <text x="110" y="60" font-size="34" fill="#10b981" text-anchor="middle" font-weight="bold">
      8+
      <animate attributeName="opacity" values="1;0.55;1" dur="2.4s" begin="0.7s" repeatCount="indefinite"/>
    </text>
    <text x="110" y="88" font-size="13" fill="#e5e7eb" text-anchor="middle">Channels Mastered</text>
  </g>

  <!-- Card 2: Meta & Google Certified Campaigns -->
  <g transform="translate(240,0)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0.35s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" from="240,20" to="240,0" dur="0.6s" begin="0.35s" fill="freeze" additive="sum"/>
    <rect x="0" y="0" width="220" height="120" rx="14" fill="url(#cardBg)" stroke="#10b981" stroke-opacity="0.35"/>
    <text x="110" y="52" font-size="20" fill="#10b981" text-anchor="middle" font-weight="bold">Meta &amp; Google</text>
    <text x="110" y="88" font-size="13" fill="#e5e7eb" text-anchor="middle">Certified Campaigns</text>
  </g>

  <!-- Card 3: 24/7 Data Optimization -->
  <g transform="translate(480,0)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="0.6s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" from="480,20" to="480,0" dur="0.6s" begin="0.6s" fill="freeze" additive="sum"/>
    <rect x="0" y="0" width="220" height="120" rx="14" fill="url(#cardBg)" stroke="#10b981" stroke-opacity="0.35"/>
    <text x="110" y="60" font-size="34" fill="#10b981" text-anchor="middle" font-weight="bold">
      24/7
      <animate attributeName="opacity" values="1;0.55;1" dur="2.4s" begin="1.3s" repeatCount="indefinite"/>
    </text>
    <text x="110" y="88" font-size="13" fill="#e5e7eb" text-anchor="middle">Data Optimization</text>
  </g>
</svg>
